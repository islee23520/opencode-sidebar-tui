name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: Check CLA
    runs-on: ubuntu-latest
    steps:
      - name: Check contributor license agreement
        if: github.event_name == 'pull_request_target' || github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: signatures/cla.json
          path-to-document: https://github.com/islee23520/open-sidebar-terminal/blob/main/CLA.md
          branch: cla-signatures
          allowlist: dependabot[bot],github-actions[bot]
