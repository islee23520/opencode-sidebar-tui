<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src {{CSP_SOURCE}} 'unsafe-inline'; script-src 'nonce-{{NONCE}}';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Sidebar Terminal</title>
    <link rel="stylesheet" href="{{CSS_URI}}" />
  </head>
  <body>
    <div id="tmux-toolbar" class="tmux-toolbar hidden">
      <span id="tmux-session-label" class="tmux-session-label"></span>
      <div class="toolbar-controls">
        <div class="tmux-command-menu">
          <button
            type="button"
            id="btn-tmux-commands"
            class="pane-btn"
            aria-label="Tmux commands"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 14 14"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <path
                d="M2 4h10M2 7h10M2 10h10"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="round"
              />
            </svg>
          </button>
          <div id="tmux-command-dropdown" class="tmux-cmd-dropdown hidden">
            <div class="tmux-cmd-search">
              <input
                type="text"
                id="tmux-cmd-search-input"
                class="tmux-cmd-search-input"
                placeholder="Search tmux commands"
                autocomplete="off"
                spellcheck="false"
              />
            </div>
            <div id="tmux-command-list" class="tmux-cmd-list"></div>
            <div class="tmux-cmd-hint">
              ↑↓ Navigate · Enter Select · Esc Dismiss
            </div>
          </div>
        </div>
        <button
          type="button"
          id="btn-kill-pane"
          class="pane-btn pane-btn--danger"
          aria-label="Close pane"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 14 14"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <line
              x1="3"
              y1="3"
              x2="11"
              y2="11"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
            <line
              x1="11"
              y1="3"
              x2="3"
              y2="11"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        </button>
      </div>
      <div class="toolbar-right">
        <button
          type="button"
          id="btn-restart"
          class="tmux-btn"
          aria-label="Restart terminal"
        >
          &#x21BB;
        </button>
      </div>
    </div>
    <div
      id="terminal-container"
      data-font-size="{{FONT_SIZE}}"
      data-font-family="{{FONT_FAMILY}}"
      data-cursor-blink="{{CURSOR_BLINK}}"
      data-cursor-style="{{CURSOR_STYLE}}"
      data-scrollback="{{SCROLLBACK}}"
    ></div>
    <div id="dashboard-container" class="dashboard-container hidden">
      <div class="dashboard-header">
        <div class="dashboard-header-main">
          <div class="dashboard-title">Session Dashboard</div>
          <div class="dashboard-workspace" id="dashboard-workspace">
            Workspace: -
          </div>
        </div>
        <div class="dashboard-actions">
          <button
            type="button"
            id="dashboard-new-tmux"
            class="dashboard-btn primary"
            data-tmux-only
          >
            New tmux
          </button>
          <button type="button" id="dashboard-new-shell" class="dashboard-btn">
            New shell
          </button>
          <button
            type="button"
            id="dashboard-toggle-scope"
            class="dashboard-btn"
          >
            Global
          </button>
          <button type="button" id="dashboard-refresh" class="dashboard-btn">
            Refresh
          </button>
          <button
            type="button"
            id="dashboard-close"
            class="dashboard-btn close-btn"
          >
            ×
          </button>
        </div>
      </div>
      <div id="dashboard-session-list" class="dashboard-session-list"></div>
      <div id="dashboard-ai-selector" class="ai-selector-backdrop">
        <div class="ai-selector-card">
          <div class="ai-selector-title">Launch AI Tool</div>
          <div
            class="ai-selector-subtitle"
            id="dashboard-ai-selector-session"
          ></div>
          <div class="ai-selector-options" id="dashboard-ai-tool-options"></div>
          <label class="ai-selector-save">
            <input type="checkbox" id="dashboard-ai-save-default" />
            <span>Save as default</span>
          </label>
          <div class="ai-selector-hint">
            ↑↓ Navigate · Enter Select · Esc Dismiss
          </div>
        </div>
      </div>
    </div>

    <div id="ai-selector" class="ai-selector-backdrop">
      <div class="ai-selector-card">
        <div class="ai-selector-title">Launch AI Tool</div>
        <div class="ai-selector-subtitle" id="ai-selector-session"></div>
        <div class="ai-selector-options" id="ai-tool-options"></div>
        <label class="ai-selector-save">
          <input type="checkbox" id="ai-save-default" />
          <span>Save as default</span>
        </label>
        <div class="ai-selector-hint">
          ↑↓ Navigate · Enter Select · Esc Dismiss
        </div>
      </div>
    </div>

    <div id="tmux-prompt" class="ai-selector-backdrop hidden">
      <div class="ai-selector-card">
        <div class="ai-selector-title">No Tmux Sessions Found</div>
        <div class="ai-selector-subtitle" id="tmux-prompt-workspace"></div>
        <div class="ai-selector-options">
          <button
            type="button"
            id="tmux-prompt-tmux"
            class="ai-selector-option"
            data-tmux-only
          >
            <div class="ai-option-icon">🗔</div>
            <div class="ai-option-details">
              <div class="ai-option-name">Create Tmux Session</div>
              <div class="ai-option-desc">
                Start a new tmux session for this workspace
              </div>
            </div>
          </button>
          <button
            type="button"
            id="tmux-prompt-shell"
            class="ai-selector-option"
          >
            <div class="ai-option-icon">⌘</div>
            <div class="ai-option-details">
              <div class="ai-option-name">Normal Shell</div>
              <div class="ai-option-desc">
                Start a regular shell without tmux
              </div>
            </div>
          </button>
        </div>
        <div class="ai-selector-hint">Click to select</div>
      </div>
    </div>

    <script nonce="{{NONCE}}" src="{{SCRIPT_URI}}"></script>
  </body>
</html>
